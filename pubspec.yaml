name: duole_gouji_counter
description: 多乐够级记牌器 - 跨平台移动端版本

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  provider: ^6.1.1
  
  # 悬浮窗（Android）
  flutter_overlay_window: ^0.4.5
  
  # 屏幕截图
  screenshot: ^2.1.0
  
  # OCR识别
  google_mlkit_text_recognition: ^0.11.0
  
  # 权限管理
  permission_handler: ^11.1.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  
  # 设备信息
  device_info_plus: ^9.1.2
  
  # 图片处理
  image: ^4.1.3
  
  # 路径
  path_provider: ^2.1.1
  
  # 国际化
  intl: ^0.19.0
  
  # UI组件
  flutter_screenutil: ^5.9.0
  
  # 动画
  flutter_animate: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/sounds/
